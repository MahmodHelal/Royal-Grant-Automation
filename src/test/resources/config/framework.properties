# ─────────────────────────────────────────────────────────────────────────────
# Royal Grant Automation — Framework Configuration
# نظام المنح الملكية — إعدادات الإطار
# ─────────────────────────────────────────────────────────────────────────────
# Override at runtime:
#   mvn test -Dbrowser=firefox -Dheadless=true
# ─────────────────────────────────────────────────────────────────────────────

# Browser: chrome | firefox | edge
browser=chrome
headless=false

# Timeouts (seconds)
timeout=20

# Portal URL — geoservices1.syadtech.com
basePortalUrl=https://geoservices1.syadtech.com/home/Login

# Localhost app URL
baseLocalUrl=http://localhost:8080/#/submissions/grantroyal

# Screenshots on failure
screenshots.on.failure=true

# Default execution tags
execution.tags=@smoke
